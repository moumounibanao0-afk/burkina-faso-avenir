<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Région - Burkina Terres d'Avenir</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Source Sans 3', sans-serif; }
    h1,h2,h3 { font-family: 'Playfair Display', serif; }
    .flag-stripe { height:6px; background: linear-gradient(90deg,#EF2B2D 50%,#009A00 50%); }
    .hero {
      min-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body class="bg-[#F5F0E8]">

  <div class="flag-stripe fixed top-0 w-full z-[60]"></div>

  <nav class="bg-white shadow-md fixed w-full z-50 top-[6px]">
    <div class="max-w-7xl mx-auto px-6 py-3 flex justify-between items-center">
      <a href="../acceuil.html" class="flex items-center gap-3">
        <span class="text-2xl">🇧🇫</span>
        <p class="text-lg font-bold text-[#008751]">Burkina Terres d'Avenir</p>
      </a>
      <a href="../regions.html" class="text-[#008751] font-semibold">← Toutes les régions</a>
    </div>
  </nav>

  <div id="contenu" class="pt-16">
    <div class="text-center py-20 text-gray-500">Chargement...</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');

    if (!slug) {
      document.getElementById('contenu').innerHTML = '<p class="text-center py-20 text-red-500">Région non spécifiée</p>';
    } else {
      fetch('http://localhost:4000/api/regions/' + slug)
        .then(function(response) { return response.json(); })
        .then(function(region) {
          document.title = region.nom + " - Burkina Terres d'Avenir";

          const imageStyle = region.image
            ? 'background-image: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url(' + region.image + ');'
            : 'background-color: #008751;';

          document.getElementById('contenu').innerHTML = `
            <div class="hero text-white text-center px-6 pt-20 pb-16" style="${imageStyle} background-size:cover; background-position:center;">
              <div>
                <p class="text-[#E8B923] uppercase tracking-widest text-sm mb-3">${region.zone.toUpperCase()}</p>
                <h1 class="text-5xl font-black mb-4">${region.nom}</h1>
                <p class="text-xl text-gray-200 mb-2">🏙️ Chef-lieu : <strong>${region.chefLieu}</strong></p>
                <p class="text-gray-300">${region.description}</p>
              </div>
            </div>

            <div class="max-w-4xl mx-auto px-6 py-12">

              <div class="bg-white rounded-2xl shadow-lg p-8 mb-8">
                <h2 class="text-2xl font-bold text-[#008751] mb-4">👥 Peuples</h2>
                <div class="flex flex-wrap gap-3">
                  ${region.peuples.map(p => `<span class="bg-green-50 text-[#008751] px-4 py-2 rounded-full font-semibold">${p}</span>`).join('')}
                </div>
              </div>

              <div class="bg-white rounded-2xl shadow-lg p-8 mb-8">
                <h2 class="text-2xl font-bold text-[#008751] mb-4">💡 Potentiels économiques</h2>
                <div class="flex flex-wrap gap-3">
                  ${region.potentiels.map(p => `<span class="bg-yellow-50 text-yellow-700 px-4 py-2 rounded-full font-semibold">${p}</span>`).join('')}
                </div>
              </div>

              <div class="bg-white rounded-2xl shadow-lg p-8 mb-8">
                <h2 class="text-2xl font-bold text-[#008751] mb-4">📊 Informations</h2>
                <div class="grid grid-cols-2 gap-6 text-center">
                  <div>
                    <p class="text-4xl font-black text-[#E8B923]">${region.provinces}</p>
                    <p class="text-gray-500">Provinces</p>
                  </div>
                  <div>
                    <p class="text-4xl font-black text-[#E8B923]">${region.zone}</p>
                    <p class="text-gray-500">Zone</p>
                  </div>
                </div>
              </div>

              <a href="../regions.html" class="block w-full text-center bg-[#008751] text-white py-4 rounded-2xl font-bold text-lg hover:bg-[#006840] transition">
                ← Retour aux 17 régions
              </a>
            </div>
          `;
        })
        .catch(function(err) {
          document.getElementById('contenu').innerHTML = '<p class="text-center py-20 text-red-500">Erreur : ' + err + '</p>';
        });
    }
  </script>
</body>
</html>
